<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Findie | Kurumsal Finans Yönetimi</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="/src/css/main.css">
</head>
<body>
  <div id="app">
    <!-- Navigation Panel -->
    <nav id="sb-nav">
      <div class="sn-head">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="sn-title" style="margin-left:4px">Findie</span>
        </div>
        <button class="sn-collapse" title="Daralt/Genişlet" onclick="toggleNav()">‹</button>
      </div>
      
      <div class="sn-tabs">
        <button class="sn-tab active" id="tab-main" onclick="switchTab('main')">Ana</button>
        <button class="sn-tab" id="tab-analiz" onclick="switchTab('analiz')">Analiz</button>
      </div>

      <div id="nav-content">
        <!-- Sidebar items rendered dynamically -->
      </div>

      <div class="sn-footer" style="position:relative">
        <div class="sn-company" id="sn-company-card">
          <div class="sn-av">Ş</div>
          <div class="sn-info">
            <div class="sn-cn">Şirket Adı</div>
            <div class="sn-cs">VKN: —</div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Content Area -->
    <main id="content">
      <header class="topbar no-print">
        <div class="tb-nav">
          <button class="tb-arrow" title="Geri">‹</button>
          <span class="tb-sep">/</span>
          <span class="tb-crumb" onclick="navigate('dashboard')">Finance</span>
          <span class="tb-sep">/</span>
          <span class="tb-crumb current" id="tb-current-crumb">Genel Bakış</span>
        </div>
        <div class="tb-right">
          <button class="tb-icon-btn"><svg class="lucide lucide-bell inline-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></button>
          <div class="tb-avatar">A</div>
        </div>
      </header>

      <!-- Page Header -->
      <div class="page-hdr anim-fade" id="page-hdr">
        <div class="page-hdr-left">
          <h1 class="ph-title" id="ph-title">Finansal Özet</h1>
          <div class="ph-sub" id="ph-sub">Şirketinizin güncel finansal durumunu takip edin.</div>
        </div>
        <div class="page-hdr-right" id="ph-actions">
          <!-- Action buttons injected here -->
        </div>
      </div>

      <!-- Filter Bar / Dynamic Controls -->
      <div class="filter-bar no-print" id="filter-bar" style="display:none"></div>

      <!-- Main Body -->
      <div class="page-body" id="page-body">
         <!-- Content injected here -->
      </div>
    </main>

    <!-- Profile Popover -->
    <div class="profile-popover" id="profile-popover">
      <div class="pp-user-info">
        <div class="pp-av" id="pp-user-av">A</div>
        <div>
          <div class="pp-user-name" id="pp-user-name">Kullanıcı</div>
          <div class="pp-user-role" id="pp-user-role">Admin</div>
        </div>
      </div>
      <div class="pp-sep"></div>
      <div class="pp-item" onclick="window.openProfilModal()">
        <svg class="pp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Profil &amp; Hesap
      </div>
      <div class="pp-item" onclick="window.openSupportModal()">
        <svg class="pp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Destek Talebi
      </div>
      <div class="pp-item" onclick="window.openSetAdminModal()">
        <svg class="pp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>
        Yetkilendirme
      </div>
      <div class="pp-item" onclick="navigate('ayarlar')">
        <svg class="pp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Sistem Ayarları
      </div>
      <div class="pp-sep"></div>
      <div class="pp-item danger" onclick="window.handleLogout()">
        <svg class="pp-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Çıkış Yap
      </div>
    </div>

  </div>

  <!-- Overlay Containers -->
  <div id="modal-container"></div>
  <div id="toast"></div>

  <!-- Entry Point -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
